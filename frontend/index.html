<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Editor</title>
<link rel="stylesheet" href="src/style.css">
<script src="src/app.js"></script>
</head>
<body>
<div id="app">
    <!-- Start page -->
    <div id="start-page" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px">
        <div style="font-size:64px;opacity:0.4">📋</div>
        <h2 style="color:var(--text-secondary);font-weight:400">Open a .deal file to edit</h2>
        <div style="display:flex;gap:12px">
            <button class="btn btn-primary" id="btn-open-file" style="font-size:16px;padding:12px 28px">📂 Open File</button>
            <button class="btn" id="btn-open-file-dialog" style="font-size:16px;padding:12px 28px">🔍 Browse...</button>
            <button class="btn" id="btn-new-deal" style="font-size:16px;padding:12px 28px">➕ New Deal</button>
        </div>
        <p style="margin-top:24px;font-size:12px;color:var(--text-muted)">
            Deal Editor v1.0.0 — Drag & drop .deal files onto this window
        </p>
    </div>

    <!-- Editor view -->
    <div id="editor-view" style="display:none;flex-direction:column;height:100vh">
        <!-- Top bar -->
        <div id="editor-topbar" style="display:flex;align-items:center;padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);gap:10px">
            <span id="editor-icon" style="font-size:20px">📋</span>
            <span id="editor-filename" style="font-weight:600;flex:1;font-size:14px"></span>
            <span id="editor-modified" style="font-size:11px;color:var(--accent-yellow);display:none">✏️ Modified</span>
            <button class="btn btn-sm" id="btn-close-file" title="Close file">✕ Close</button>
            <button class="btn btn-sm btn-primary" id="btn-save">💾 Save</button>
        </div>

        <!-- Tab bar -->
        <div id="tabs" style="display:flex;gap:2px;padding:0 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border)">
            <button class="tab-btn active" data-tab="order">📦 Order</button>
            <button class="tab-btn" data-tab="warehouse">📥 Warehouse</button>
        </div>

        <!-- Tab content -->
        <div id="tab-content" style="flex:1;overflow-y:auto;padding:16px"></div>
    </div>

    <!-- Product picker overlay -->
    <div id="product-picker-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center">
        <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);width:600px;max-height:80vh;display:flex;flex-direction:column">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                <strong>📂 Select Products Directory</strong>
                <button class="btn btn-sm" id="picker-close-btn">✕</button>
            </div>
            <div style="padding:8px 16px;display:flex;gap:8px">
                <input type="text" id="picker-dir-input" placeholder="Products directory path..." style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary)" />
                <button class="btn btn-sm" id="picker-browse-btn">📁 Browse</button>
                <button class="btn btn-sm btn-primary" id="picker-load-btn">Load</button>
            </div>
            <div style="padding:0 16px"><input type="text" id="picker-filter" placeholder="Filter products..." style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text-primary);display:none" /></div>
            <div id="picker-list" style="overflow-y:auto;flex:1;padding:8px 16px"></div>
            <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px">
                <button class="btn" id="picker-cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="picker-add-btn">➕ Add Selected</button>
            </div>
        </div>
    </div>
</div>

<script src="src/main.js"></script>
</body>
</html>
